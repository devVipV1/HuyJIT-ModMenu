name: Build

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git $HOME/theos
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV

    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y make clang ldid zip unzip

    - name: Build
      run: |
        make package

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: package
        path: packages/*.deb
